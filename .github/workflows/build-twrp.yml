name: Build TWRP with DroidSpaces

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip wget python3

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-15.1 \
            https://github.com/LineageOS/android_kernel_motorola_msm8996.git \
            kernel

      - name: Apply patches
        run: |
          cd kernel
          git apply ../patches/0002-scripts-dtc-fix-yylloc-link-failure-with-modern-host.patch
          git apply ../patches/0001-albus-add-DroidSpaces-legacy-kernel-fixes.patch

      - name: Download Android NDK r17c (GCC 4.9)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
          unzip -q android-ndk-r17c-linux-x86_64.zip
          echo "CROSS=${PWD}/android-ndk-r17c/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin/aarch64-linux-android-" >> $GITHUB_ENV

      - name: Build TWRP kernel
        run: |
          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=${{ env.CROSS }} \
            albus_defconfig

          kernel/scripts/kconfig/merge_config.sh -m \
            -O ${{ github.workspace }}/build \
            ${{ github.workspace }}/build/.config \
            ${{ github.workspace }}/configs/recovery-droidspaces.fragment

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 olddefconfig

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=${{ env.CROSS }} \
            -j$(nproc) Image.gz

      - name: Repack TWRP
        run: |
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v28.1/Magisk-v28.1.apk -O /tmp/magisk.apk
          unzip -q -o /tmp/magisk.apk lib/arm64-v8a/magiskboot -d /tmp/magisk_extract
          sudo cp /tmp/magisk_extract/lib/arm64-v8a/magiskboot /usr/local/bin/

          wget -q https://github.com/nicholaschum/twrp_albus/releases/download/v3.6.2/twrp-3.6.2_9-0-albus.img -O base-twrp.img
          magiskboot unpack base-twrp.img
          cp ${{ github.workspace }}/build/arch/arm64/boot/Image.gz kernel
          magiskboot repack base-twrp.img ${{ github.workspace }}/twrp-droidspaces-albus.img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: twrp-droidspaces-albus
          path: twrp-droidspaces-albus.img
