name: Build Albus Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip wget python3 ccache

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-15.1 \
            https://github.com/SaaSD3v/android_kernel_motorola_msm8996.git \
            kernel

      - name: Download GCC 4.9 AArch64
        run: |
          git clone --depth=1 -b android11-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            toolchains/gcc-aarch64-4.9

      - name: Build kernel
        run: |
          export PATH="${{ github.workspace }}/toolchains/gcc-aarch64-4.9/bin:$PATH"

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- \
            albus_defconfig

          kernel/scripts/kconfig/merge_config.sh -m \
            -O ${{ github.workspace }}/build \
            ${{ github.workspace }}/build/.config \
            ${{ github.workspace }}/configs/droidspaces-minimal.fragment

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 olddefconfig

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- \
            -j$(nproc) Image.gz

      - name: Package kernel
        run: |
          mkdir -p output
          cp build/arch/arm64/boot/Image.gz output/
          cd output && zip -r9 ../albus-kernel-droidspaces.zip Image.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: albus-kernel-droidspaces
          path: albus-kernel-droidspaces.zip
