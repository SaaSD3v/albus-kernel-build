name: Build Albus Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip wget python3

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-15.1 \
            https://github.com/LineageOS/android_kernel_motorola_msm8996.git \
            kernel

      - name: Apply patches
        run: |
          cd kernel
          git apply ../patches/0002-scripts-dtc-fix-yylloc-link-failure-with-modern-host.patch
          git apply ../patches/0001-albus-add-DroidSpaces-legacy-kernel-fixes.patch

      - name: Download Android NDK r17c (GCC 4.9)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
          unzip -q android-ndk-r17c-linux-x86_64.zip
          echo "CROSS=${PWD}/android-ndk-r17c/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin/aarch64-linux-android-" >> $GITHUB_ENV

      - name: Build kernel
        run: |
          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=${{ env.CROSS }} \
            albus_defconfig

          kernel/scripts/kconfig/merge_config.sh -m \
            -O ${{ github.workspace }}/build \
            ${{ github.workspace }}/build/.config \
            ${{ github.workspace }}/configs/android-wifi-safe.fragment

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 olddefconfig

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=${{ env.CROSS }} \
            -j$(nproc) Image.gz dtbs modules

      - name: Build dtbTool
        run: |
          gcc -O2 -Wall -o dtbtool_bin dtbtool/dtbtool.c
          ./dtbtool_bin --force-v3 --motorola 1 --page-size 2048 \
            --dtc-path build/scripts/dtc/ \
            --output-file output/dtb \
            build/arch/arm64/boot/dts/qcom/

      - name: Package kernel
        run: |
          mkdir -p output
          cp build/arch/arm64/boot/Image.gz output/
          cp output/dtb output/dt.img
          cp build/.config output/albus.config
          cd output && zip -r9 ../albus-kernel-droidspaces.zip Image.gz dt.img albus.config

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: albus-kernel-droidspaces
          path: albus-kernel-droidspaces.zip
