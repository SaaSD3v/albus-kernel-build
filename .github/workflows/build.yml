name: Build Albus Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip libtinfo-dev unzip
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Clone kernel
        run: |
          git clone --depth=1 -b lineage-15.1 https://github.com/SaaSD3v/android_kernel_motorola_msm8996.git kernel

      - name: GCC 4.9
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
          unzip -q android-ndk-r17c-linux-x86_64.zip
          echo "CROSS=$PWD/android-ndk-r17c/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin/aarch64-linux-android-" >> $GITHUB_ENV

      - name: Build
        run: |
          make -C kernel O=$PWD/build ARCH=arm64 CROSS_COMPILE=$CROSS albus_defconfig
          kernel/scripts/kconfig/merge_config.sh -m -O $PWD/build $PWD/build/.config $PWD/configs/wifi-safe.fragment
          chmod +x configs/remove-optional-firewall.fragment
          configs/remove-optional-firewall.fragment build/.config
          make -C kernel O=$PWD/build ARCH=arm64 olddefconfig
          make -C kernel O=$PWD/build ARCH=arm64 CROSS_COMPILE=$CROSS -j$(nproc) Image.gz

      - name: Package with AnyKernel
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp build/arch/arm64/boot/Image.gz anykernel/
          cp anykernel.sh anykernel/
          cd anykernel
          zip -r9 ../albus-kernel.zip * -x '*.git*'

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: albus-kernel
          path: albus-kernel.zip

      - name: Get magiskboot
        run: |
          wget -q "https://github.com/topjohnwu/Magisk/releases/download/v28.1/Magisk-v28.1.apk" -O magisk.apk
          mkdir -p magisk-extracted
          unzip -o -q magisk.apk -d magisk-extracted
          cp magisk-extracted/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: Patch TWRP with compiled kernel
        run: |
          echo "=== Unpacking TWRP ==="
          ./magiskboot unpack twrp-src/twrp.img
          echo "Original kernel: $(wc -c < kernel) bytes"
          mv kernel kernel_orig

          echo "=== Recompressing kernel with max compression ==="
          gzip -9 -c build/arch/arm64/boot/Image.gz > kernel
          echo "New kernel (gzip -9): $(wc -c < kernel) bytes"

          echo "=== Repacking TWRP ==="
          ./magiskboot repack twrp-src/twrp.img twrp-patched.img
          echo "Patched TWRP: $(wc -c < twrp-patched.img) bytes"
          echo "Recovery partition limit: 21073920 bytes"

      - name: Upload patched TWRP
        uses: actions/upload-artifact@v4
        with:
          name: twrp-patched
          path: twrp-patched.img
