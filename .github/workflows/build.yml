name: Build Albus Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip wget python3

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-15.1 \
            https://github.com/SaaSD3v/android_kernel_motorola_msm8996.git \
            kernel

      - name: Apply yylloc fix
        run: |
          cd kernel
          sed -i 's/^YYLTYPE yylloc;$/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l
          sed -i 's/^YYLTYPE yylloc;$/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped

      - name: Download Android NDK r17c (GCC 4.9)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
          unzip -q android-ndk-r17c-linux-x86_64.zip
          echo "CROSS=${PWD}/android-ndk-r17c/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin/aarch64-linux-android-" >> $GITHUB_ENV

      - name: Build kernel
        run: |
          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=${{ env.CROSS }} \
            albus_defconfig

          kernel/scripts/kconfig/merge_config.sh -m \
            -O ${{ github.workspace }}/build \
            ${{ github.workspace }}/build/.config \
            ${{ github.workspace }}/configs/droidspaces-minimal.fragment

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 olddefconfig

          make -C kernel O=${{ github.workspace }}/build \
            ARCH=arm64 CROSS_COMPILE=${{ env.CROSS }} \
            -j$(nproc) Image.gz

      - name: Package kernel
        run: |
          mkdir -p output
          cp build/arch/arm64/boot/Image.gz output/
          cd output && zip -r9 ../albus-kernel-droidspaces.zip Image.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: albus-kernel-droidspaces
          path: albus-kernel-droidspaces.zip
