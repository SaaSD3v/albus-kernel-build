name: Build Albus Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-15.1 \
            https://github.com/LineageOS/android_kernel_motorola_msm8996.git \
            kernel

      - name: Download Android NDK r17c (GCC 4.9)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
          unzip -q android-ndk-r17c-linux-x86_64.zip
          echo "CROSS=${PWD}/android-ndk-r17c/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin/aarch64-linux-android-" >> $GITHUB_ENV

      - name: Apply patches
        run: |
          cd kernel
          git apply ../patches/0001-droidspaces-fixes.patch
          git apply ../patches/0002-dtc-yylloc.patch

      - name: Generate config
        run: |
          make -C kernel O=out ARCH=arm64 albus_defconfig
          cd kernel
          scripts/kconfig/merge_config.sh -m -O out out/.config ../configs/droidspaces.fragment
          make ARCH=arm64 O=out olddefconfig

      - name: Build kernel
        run: |
          make -C kernel O=out ARCH=arm64 \
            CROSS_COMPILE=${{ env.CROSS }} \
            -j$(nproc) Image.gz dtbs modules

      - name: Build dtbTool
        run: |
          gcc -O2 -Wall -o dtbtool dtbtool/dtbtool.c
          ./dtbtool --force-v3 --motorola 1 --page-size 2048 \
            --dtc-path kernel/out/scripts/dtc/ \
            --output-file kernel/out/dtb \
            kernel/out/arch/arm64/boot/dts/qcom/

      - name: Package kernel
        run: |
          cd anykernel
          cp ../kernel/out/arch/arm64/boot/Image.gz .
          cp ../kernel/out/dtb .
          zip -r9 ../albus-kernel-droidspaces.zip . -x '*.git*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: albus-kernel-droidspaces
          path: albus-kernel-droidspaces.zip
